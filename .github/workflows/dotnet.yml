name: .NET Core CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Restore dependencies
      run: dotnet restore Lab5_App.sln

    - name: Build
      run: dotnet build Lab5_App.sln --no-restore

    - name: Test
      run: dotnet test Lab5_App.sln --no-build --verbosity normal